<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Июнь 2026 · Автор новой жизни</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --steel:#DDE3E8; --steel2:#c5d0d9; --steel3:#b0bfca;
  --blk:#161616; --blk2:#0a0a0a; --blk3:#2a2a2a;
  --wh:#fff; --mu:#6a7b8a;
  --bo:rgba(22,22,22,.10); --bo2:rgba(22,22,22,.20);
  --good:#1a5e38; --warn:#7a5000; --bad:#7a1616;
  --fh:'Unbounded',sans-serif; --fb:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--steel);color:var(--blk);font-family:var(--fb);font-size:13px;line-height:1.5;}

/* ── ШАПКА ── */
.hdr{background:var(--blk);position:relative;overflow:hidden;}
.hdr-grad{
  position:absolute;top:0;left:0;right:0;
  /* Только верхняя часть — не накрывает вкладки */
  bottom:56px;
  background:linear-gradient(180deg,#080e16 0%,#1d3542 45%,#365a58 70%,#5e8c72 100%);
  opacity:.93;
}
.hdr-inner{
  position:relative;z-index:2;
  display:flex;align-items:center;justify-content:space-between;
  padding:22px 36px 18px;
}
.logo-img{height:40px;display:block;}
.hdr-right{text-align:right;}
.hdr-lbl{font-family:var(--fh);font-size:8px;font-weight:400;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:4px;}
.hdr-title{font-family:var(--fh);font-size:18px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#fff;}
.hdr-date{font-size:11px;letter-spacing:.08em;color:rgba(255,255,255,.85);margin-top:3px;font-family:var(--fh);font-weight:500;}

/* ── ВКЛАДКИ ── */
.tabs{
  position:relative;z-index:2;
  background:#000;
  border-top:1px solid rgba(255,255,255,.15);
  display:flex;
}
.tab{
  flex:1; padding:17px 24px;
  font-family:var(--fh);font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:rgba(255,255,255,.45);
  background:rgba(255,255,255,.08);
  border:none;border-bottom:3px solid transparent;
  cursor:pointer;transition:background .15s,border-color .15s,color .15s;
}
.tab.active{
  background:#000;
  border-bottom-color:var(--steel);
  color:#fff;
}
.tab:hover:not(.active){background:rgba(255,255,255,.14);color:rgba(255,255,255,.75);}

/* ── КОНТЕНТ ── */
.wrap{padding:24px 36px 40px;}
.sec{display:none;}
.sec.on{display:block;}

/* ── КАРТОЧКИ ── */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.card{background:var(--wh);border:1px solid var(--bo);padding:14px 16px 13px;position:relative;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cl,transparent);}
.card-lbl{font-family:var(--fh);font-size:8px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--mu);margin-bottom:9px;}
.row1{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
.v1{font-family:var(--fh);font-size:22px;font-weight:700;letter-spacing:-.02em;line-height:1;color:var(--blk);}
.u1{font-size:12px;color:var(--mu);font-family:var(--fh);font-weight:300;}
.row2{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-top:4px;}
.v2{font-family:var(--fh);font-size:15px;font-weight:600;line-height:1;color:var(--blk);}
.u2{font-size:11px;color:var(--mu);}
.rowsub{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;margin-top:7px;padding-top:7px;border-top:1px solid var(--bo);}
.s1{font-size:11px;font-weight:600;} .s2{font-size:11px;color:var(--mu);}
.good{color:var(--good);} .warn{color:var(--warn);} .bad{color:var(--bad);} .neu{color:var(--mu);}

/* ── ФИЛЬТРЫ ── */
.filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.fbtn{font-family:var(--fh);font-size:7px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:7px 10px;border:1px solid var(--bo2);background:transparent;color:var(--mu);cursor:pointer;transition:all .15s;white-space:nowrap;}
.fbtn.active{background:var(--blk);color:#fff;border-color:var(--blk);}
.fbtn:hover:not(.active){border-color:var(--blk);color:var(--blk);}

/* ── ЧАРТ ── */
.cpanel{background:var(--wh);border:1px solid var(--bo);padding:18px 22px;margin-bottom:8px;}
.ctop{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.clbl{font-family:var(--fh);font-size:8px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--mu);}
.leg{display:flex;gap:16px;}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mu);}
.lsq{width:12px;height:4px;}
.cwrap{position:relative;height:220px;}

/* ── ТАБЛИЦА ── */
.tpanel{background:var(--wh);border:1px solid var(--bo);overflow-x:auto;}
.thead{display:grid;padding:9px 18px;background:var(--steel2);border-bottom:1px solid var(--bo2);}
.thead span{font-family:var(--fh);font-size:8px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--blk3);text-align:right;}
.thead span:first-child{text-align:left;}
.trow{display:grid;padding:10px 18px;border-bottom:1px solid var(--bo);align-items:center;transition:background .1s;}
.trow:hover{background:#f2f5f7;}
.trow:last-child{border-bottom:none;}
.trow.tot{background:#eaeff3;border-top:1px solid var(--bo2);border-bottom:none;}
.trow.emp{opacity:.38;}
.pname{font-size:13px;font-weight:500;}
.cell{text-align:right;font-size:12px;font-variant-numeric:tabular-nums;}
.cell.mu{color:var(--mu);} .cell.bld{font-weight:700;}
.barcell{display:flex;align-items:center;justify-content:flex-end;gap:6px;}
.barbg{width:52px;height:4px;background:var(--steel3);flex-shrink:0;}
.barfill{height:100%;transition:width .5s;}
.pctv{font-size:11px;font-weight:700;min-width:34px;text-align:right;font-variant-numeric:tabular-nums;}
/* мобильное скрытие вспомогательных колонок */
.col-mob-hide{display:block;}
@media(max-width:600px){
  .col-mob-hide{display:none!important;}
  .barbg{width:32px;}
  .pctv{min-width:26px;font-size:10px;}
  .pname{font-size:11px;}
  .cell{font-size:10px;}
  .trow,.thead{padding-left:10px;padding-right:10px;}
  .cards{grid-template-columns:repeat(2,1fr);}
  .card{padding:14px 12px;}
  .card-lbl{font-size:7px;letter-spacing:.12em;margin-bottom:6px;}
  .v1{font-size:22px;}
  .u1{font-size:9px;}
  .v2,.s1{font-size:13px;}
}

/* ── ПОДВАЛ ── */
.foot{background:var(--blk);border-top:1px solid rgba(255,255,255,.07);padding:10px 36px;display:flex;justify-content:space-between;}
.foot span{font-family:var(--fh);font-size:7px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.25);}

@media(max-width:860px){
  .cards{grid-template-columns:repeat(2,1fr);}
  .hdr-inner,.wrap,.foot{padding-left:20px;padding-right:20px;}
  .logo-img{height:32px;} .tab{font-size:10px;padding:14px 12px;}
}
</style>
</head>

function moneyExpected(fc,pl){return fc>pl?Math.round(fc/DE*DT):pl;}

function buildSC(type){
  var keys=tk(type),tPl=0,tFc=0,tPlS=0,tFcS=0;
  for(var i=0;i<PR.length;i++){var pr=PR[i];for(var j=0;j<keys.length;j++){var k=keys[j];tPl+=SD[pr].pl[k]||0;tFc+=SD[pr].fc[k]||0;tPlS+=SD[pr].plS[k]||0;tFcS+=SD[pr].fcS[k]||0;}}
  var pvQ=pc(tFc,tPl),pvS=pc(tFcS,tPlS),devQ=tFc-tPl,devS=tFcS-tPlS,rQ=rr(tFc,tPl),rS=rr(tFcS,tPlS);
  var h='<div class="card" style="--cl:#9ab4c8"><div class="card-lbl">План июнь</div>'
    +'<div class="row1"><span class="v1">'+f(tPl)+'</span><span class="u1">шт.</span></div>'
    +'<div class="row2"><span class="v2">'+fr(tPlS)+'</span><span class="u2">тыс&#8381;</span></div></div>'
    +'<div class="card" style="--cl:#161616"><div class="card-lbl">Факт июнь</div>'
    +'<div class="row1"><span class="v1">'+f(tFc)+'</span><span class="u1">шт.</span></div>'
    +'<div class="row2"><span class="v2">'+fr(tFcS)+'</span><span class="u2">тыс&#8381;</span></div></div>'
    +'<div class="card" style="--cl:#8a6010"><div class="card-lbl">Выполнение к дате</div>'
    +'<div class="row1"><span class="v1 '+cls(pvQ)+'">'+ps(pvQ)+'</span><span class="u1">по шт.</span></div>'
    +'<div class="row2"><span class="v2 '+cls(pvS)+'">'+ps(pvS)+'</span><span class="u2">по тыс&#8381;</span></div>'
    +'<div class="rowsub"><span class="s1 '+cls(pvQ)+'">'+(devQ>=0?"+":"")+f(devQ)+' шт.</span><span class="s2">/</span><span class="s1 '+cls(pvS)+'">'+(devS>=0?"+":"")+fr(devS)+' тыс&#8381;</span></div></div>'
    +'<div class="card" style="--cl:#1a5e38"><div class="card-lbl">Ожид. за месяц</div>'
    +'<div class="row1"><span class="v1 '+(rQ?cls(rQ.p):"neu")+'">'+(rQ?f(rQ.proj):"—")+'</span><span class="u1">шт.</span></div>'
    +'<div class="row2"><span class="v2 '+(rS?cls(rS.p):"neu")+'">'+(rS?fr(rS.proj):"—")+'</span><span class="u2">тыс&#8381;</span></div>'
    +'<div class="rowsub"><span class="s1 '+(rQ?cls(rQ.p):"neu")+'">'+(rQ?rQ.p+"%":"—")+' шт.</span><span class="s2">/</span><span class="s1 '+(rS?cls(rS.p):"neu")+'">'+(rS?rS.p+"%":"—")+' тыс&#8381;</span></div></div>';
  document.getElementById("sc").innerHTML=h;
}

function buildMC(){
  var tPlFM=0,tPl=0,tFc=0;
  for(var i=0;i<PR.length;i++){tPlFM+=MD[PR[i]].plFM;tPl+=MD[PR[i]].pl;tFc+=MD[PR[i]].fc;}
  var pv=pc(tFc,tPlFM),dev=tFc-tPlFM,tExp=moneyExpected(tFc,tPl),ep=pc(tExp,tPlFM);
  var h='<div class="card" style="--cl:#9ab4c8"><div class="card-lbl">План июнь (ФМ)</div>'
    +'<div class="row1"><span class="v1">'+f(tPlFM)+'</span><span class="u1">тыс&#8381;</span></div></div>'
    +'<div class="card" style="--cl:#161616"><div class="card-lbl">Факт июнь</div>'
    +'<div class="row1"><span class="v1">'+f(tFc)+'</span><span class="u1">тыс&#8381;</span></div></div>'
    +'<div class="card" style="--cl:#7a1616"><div class="card-lbl">Выполнение к дате</div>'
    +'<div class="row1"><span class="v1 '+cls(pv)+'">'+ps(pv)+'</span><span class="u1">от плана ФМ</span></div>'
    +'<div class="rowsub"><span class="s1 '+cls(pv)+'">'+(dev>=0?"+":"")+f(dev)+'</span><span class="s2">тыс&#8381; отклонение</span></div></div>'
    +'<div class="card" style="--cl:#1a5e38"><div class="card-lbl">Ожид. за месяц</div>'
    +'<div class="row1"><span class="v1 '+cls(ep)+'">'+f(tExp)+'</span><span class="u1">тыс&#8381;</span></div>'
    +'<div class="rowsub"><span class="s1 '+cls(ep)+'">'+ps(ep)+'</span><span class="s2">'+(tFc>tPl?"run rate":"от плана ФМ")+'</span></div></div>';
  document.getElementById("mc").innerHTML=h;
}

function drawSChart(type){
  var keys=tk(type),labs=[],planD=[],factD=[];
  for(var i=0;i<PR.length;i++){var pr=PR[i],ok=false;for(var j=0;j<keys.length;j++){if(SD[pr].pl[keys[j]]>0||SD[pr].fc[keys[j]]>0){ok=true;break;}}
    if(ok){var pl=0,fc=0;for(var j=0;j<keys.length;j++){pl+=SD[pr].pl[keys[j]]||0;fc+=SD[pr].fc[keys[j]]||0;}labs.push(pr);planD.push(pl);factD.push(fc);}
  }
  if(sCI)sCI.destroy();
  sCI=new Chart(document.getElementById("sC"),{type:"bar",data:{labels:labs,datasets:[
    {label:"план",data:planD,backgroundColor:"rgba(178,196,210,.55)",borderColor:"#b2c4d2",borderWidth:1,borderRadius:0},
    {label:"факт",data:factD,backgroundColor:"#161616",borderRadius:0}
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{backgroundColor:"#161616",titleColor:"#fff",bodyColor:"rgba(255,255,255,.7)",padding:10,cornerRadius:0,callbacks:{label:function(c){return" "+c.dataset.label+": "+c.raw+" шт."}}}},
    scales:{x:{grid:{display:false},ticks:{color:"#6a7b8a",font:{size:11}}},y:{grid:{color:"rgba(0,0,0,.06)"},ticks:{color:"#6a7b8a",font:{size:11},stepSize:2},title:{display:true,text:"шт.",color:"#6a7b8a",font:{size:10}}}}}});
}

function drawMChart(){
  var labs=[],planD=[],factD=[];
  for(var i=0;i<PR.length;i++){var pr=PR[i];if(MD[pr].plFM>0||MD[pr].fc>0){labs.push(pr);planD.push(MD[pr].plFM);factD.push(MD[pr].fc);}}
  if(mCI)mCI.destroy();
  mCI=new Chart(document.getElementById("mC"),{type:"bar",data:{labels:labs,datasets:[
    {label:"план ФМ",data:planD,backgroundColor:"rgba(178,196,210,.55)",borderColor:"#b2c4d2",borderWidth:1,borderRadius:0},
    {label:"факт",data:factD,backgroundColor:"#161616",borderRadius:0}
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{backgroundColor:"#161616",titleColor:"#fff",bodyColor:"rgba(255,255,255,.7)",padding:10,cornerRadius:0,callbacks:{label:function(c){return" "+c.dataset.label+": "+f(c.raw)+" тыс."}}}},
    scales:{x:{grid:{display:false},ticks:{color:"#6a7b8a",font:{size:11}}},y:{grid:{color:"rgba(0,0,0,.06)"},ticks:{color:"#6a7b8a",font:{size:11},callback:function(v){return f(v);}},title:{display:true,text:"тыс. руб.",color:"#6a7b8a",font:{size:10}}}}}});
}

function trow(g,cells){return'<div class="trow" style="grid-template-columns:'+g+'">'+cells+'</div>';}
function trowEmp(g,name){return'<div class="trow emp" style="grid-template-columns:'+g+'"><span class="pname">'+name+'</span><span class="cell mu">—</span><span class="cell mu">—</span><span class="cell mu" style="text-align:right;font-size:10px">нет плана</span><span class="cell mu">—</span></div>';}

function drawSTable(type){
  var mob=window.innerWidth<=600;
  var keys=tk(type),rows="",tPl=0,tFc=0,tPlS=0,tFcS=0;
  // мобильный грид: без колонок шт. и без отклонения
  var g=mob?"1fr 72px 72px 90px":"1.7fr 56px 56px 88px 88px 120px 82px";
  for(var i=0;i<PR.length;i++){
    var pr=PR[i],pl=0,fc=0,plS=0,fcS=0;
    for(var j=0;j<keys.length;j++){var k=keys[j];pl+=SD[pr].pl[k]||0;fc+=SD[pr].fc[k]||0;plS+=SD[pr].plS[k]||0;fcS+=SD[pr].fcS[k]||0;}
    tPl+=pl;tFc+=fc;tPlS+=plS;tFcS+=fcS;
    var pv=pc(fcS,plS),bw=plS>0?Math.min(100,Math.round(fcS/plS*100)):0,col=bc(pv),dev=fcS-plS;
    if(!pl&&!fc){
      if(mob){rows+='<div class="trow emp" style="grid-template-columns:'+g+'"><span class="pname">'+pr+'</span><span class="cell mu">—</span><span class="cell mu">—</span><span class="cell mu" style="text-align:right;font-size:10px">нет плана</span></div>';}
      else{rows+='<div class="trow emp" style="grid-template-columns:'+g+'"><span class="pname">'+pr+'</span><span class="cell mu">—</span><span class="cell mu">—</span><span class="cell mu">—</span><span class="cell mu">—</span><span class="cell mu" style="text-align:right;font-size:10px">нет плана</span><span class="cell mu">—</span></div>';}
    }
    else{
      rows+='<div class="trow" style="grid-template-columns:'+g+'"><span class="pname">'+pr+'</span>';
      if(!mob){rows+='<span class="cell mu">'+pl+'</span><span class="cell bld">'+fc+'</span>';}
      rows+='<span class="cell mu">'+(plS?fr(plS):"—")+'</span><span class="cell bld">'+(fcS?fr(fcS):"—")+'</span>';
      rows+='<span class="barcell"><div class="barbg"><div class="barfill" style="width:'+bw+'%;background:'+col+'"></div></div><span class="pctv" style="color:'+col+'">'+ps(pv)+'</span></span>';
      if(!mob){rows+='<span class="cell" style="color:'+(dev>=0?"#1a5e38":"#7a1616")+'">'+(dev>=0?"+":"")+fr(dev)+'</span>';}
      rows+='</div>';
    }
  }
  var tpv=pc(tFcS,tPlS),tc=bc(tpv),tbw=tPlS>0?Math.min(100,Math.round(tFcS/tPlS*100)):0,td=tFcS-tPlS;
  rows+='<div class="trow tot" style="grid-template-columns:'+g+'"><span class="pname">Итого</span>';
  if(!mob){rows+='<span class="cell">'+tPl+'</span><span class="cell bld">'+tFc+'</span>';}
  rows+='<span class="cell">'+fr(tPlS)+'</span><span class="cell bld">'+fr(tFcS)+'</span>';
  rows+='<span class="barcell"><div class="barbg"><div class="barfill" style="width:'+tbw+'%;background:'+tc+'"></div></div><span class="pctv" style="color:'+tc+'">'+ps(tpv)+'</span></span>';
  if(!mob){rows+='<span class="cell bld" style="color:'+(td>=0?"#1a5e38":"#7a1616")+'">'+(td>=0?"+":"")+fr(td)+'</span>';}
  rows+='</div>';
  var hdr=mob
    ?'<div class="thead" style="grid-template-columns:'+g+'"><span style="text-align:left">Проект</span><span>Пл,тыс&#8381;</span><span>Фк,тыс&#8381;</span><span>Вып.</span></div>'
    :'<div class="thead" style="grid-template-columns:'+g+'"><span style="text-align:left">Проект</span><span>Пл,шт</span><span>Фк,шт</span><span>Пл,тыс&#8381;</span><span>Фк,тыс&#8381;</span><span>Выполнение</span><span>Откл,тыс&#8381;</span></div>';
  document.getElementById("st").innerHTML=hdr+rows;
}

function drawMTable(){
  var mob=window.innerWidth<=600;
  var g=mob?"1fr 60px 60px 60px 76px":"1.7fr 100px 100px 100px 120px 90px";
  var rows="",tPlFM=0,tPl=0,tFc=0;
  for(var i=0;i<PR.length;i++){
    var pr=PR[i],d=MD[pr];tPlFM+=d.plFM;tPl+=d.pl;tFc+=d.fc;
    var pv=pc(d.fc,d.plFM),bw=d.plFM>0?Math.min(100,Math.round(d.fc/d.plFM*100)):0,col=bc(pv),dev=d.fc-d.plFM;
    if(!d.plFM&&!d.fc){
      rows+='<div class="trow emp" style="grid-template-columns:'+g+'"><span class="pname">'+pr+'</span><span class="cell mu">—</span><span class="cell mu">—</span><span class="cell mu">—</span><span class="cell mu" style="text-align:right;font-size:10px">нет плана</span>'+(mob?'':' <span class="cell mu">—</span>')+ '</div>';
    }
    else{
      rows+='<div class="trow" style="grid-template-columns:'+g+'"><span class="pname">'+pr+'</span>';
      rows+='<span class="cell mu">'+f(d.plFM)+'</span>';
      rows+='<span class="cell" style="color:#1a5e38;font-style:italic">'+f(d.pl)+'</span>';
      rows+='<span class="cell bld">'+f(d.fc)+'</span>';
      rows+='<span class="barcell"><div class="barbg"><div class="barfill" style="width:'+bw+'%;background:'+col+'"></div></div><span class="pctv" style="color:'+col+'">'+ps(pv)+'</span></span>';
      if(!mob){rows+='<span class="cell" style="color:'+(dev>=0?"#1a5e38":"#7a1616")+'">'+(dev>=0?"+":"")+f(dev)+'</span>';}
      rows+='</div>';
    }
  }
  var tpv=pc(tFc,tPlFM),tc=bc(tpv),tbw=tPlFM>0?Math.min(100,Math.round(tFc/tPlFM*100)):0,td=tFc-tPlFM;
  rows+='<div class="trow tot" style="grid-template-columns:'+g+'"><span class="pname">Итого</span>';
  rows+='<span class="cell">'+f(tPlFM)+'</span>';
  rows+='<span class="cell" style="font-style:italic">'+f(tPl)+'</span>';
  rows+='<span class="cell bld">'+f(tFc)+'</span>';
  rows+='<span class="barcell"><div class="barbg"><div class="barfill" style="width:'+tbw+'%;background:'+tc+'"></div></div><span class="pctv" style="color:'+tc+'">'+ps(tpv)+'</span></span>';
  if(!mob){rows+='<span class="cell bld" style="color:'+(td>=0?"#1a5e38":"#7a1616")+'">'+(td>=0?"+":"")+f(td)+'</span>';}
  rows+='</div>';
  var hdr=mob
    ?'<div class="thead" style="grid-template-columns:'+g+'"><span style="text-align:left">Проект</span><span>Пл,ФМ</span><span>Ожид</span><span>Факт</span><span>Вып.</span></div>'
    :'<div class="thead" style="grid-template-columns:'+g+'"><span style="text-align:left">Проект</span><span>План ФМ,тыс&#8381;</span><span>Ожид,тыс&#8381;</span><span>Факт,тыс&#8381;</span><span>Выполнение</span><span>Откл от ФМ</span></div>';
  document.getElementById("mt").innerHTML=hdr+rows;
}

function st(t){
  CUR=t;
  var labels={"все":"Все объекты","кв":"Квартиры","парк":"Паркинг","клад":"Кладовые","комм":"Коммерция"};
  var btns=document.querySelectorAll(".fbtn");
  for(var i=0;i<btns.length;i++){btns[i].classList.toggle("active",btns[i].textContent.trim()===labels[t]);}
  buildSC(t);drawSChart(t);drawSTable(t);
}

function sw(tab){
  // Показываем нужную секцию, скрываем остальные
  document.getElementById("sales").style.display = (tab==="sales") ? "block" : "none";
  document.getElementById("money").style.display = (tab==="money") ? "block" : "none";
  // Переключаем активный таб
  document.getElementById("tab-sales").className = "tab" + (tab==="sales" ? " active" : "");
  document.getElementById("tab-money").className = "tab" + (tab==="money" ? " active" : "");
  // Инициализируем поступления при первом клике
  if(tab==="money" && !moneyBuilt){
    buildMC(); drawMChart(); drawMTable();
    moneyBuilt=true;
  }
}

// Инициализация
buildSC("все");
drawSChart("все");
drawSTable("все");
</script>
</body>
</html>
